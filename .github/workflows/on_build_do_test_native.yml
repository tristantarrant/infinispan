name: Native Test
run-name: ${{ github.event.workflow_run.display_title }}
on:
   workflow_run:
      workflows: [Build]
      types: [completed]

permissions:
  contents: read
  packages: read

concurrency:
  group: >
      ${{ github.workflow }}-${{ github.event.workflow_run.head_repository.full_name }}-
      ${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: ${{ github.event.workflow_run.event == 'pull_request' }}

jobs:
  get-info:
      if: github.event.workflow_run.conclusion == 'success'
      name: Get Origin Workflow Info
      runs-on: ubuntu-latest
      outputs:
         build-type: ${{ steps.build-type.outputs.build-type }}
      steps:
         - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
           with:
             sparse-checkout: |
               .github/
             sparse-checkout-cone-mode: false
             fetch-depth: 1

         - name: Download build type
           id: download-build-type
           uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
           continue-on-error: true
           with:
             name: build-type
             run-id: ${{ github.event.workflow_run.id }}
             github-token: ${{ github.token }}

         - name: Read build type
           id: build-type
           run: |
             if [ -f build-type.txt ]; then
               BUILD_TYPE=$(cat build-type.txt)
             else
               BUILD_TYPE="full"
               echo "build-type artifact not found (older branch?), defaulting to full build"
             fi
             echo "build-type=$BUILD_TYPE" >> "$GITHUB_OUTPUT"
             echo "Build type: $BUILD_TYPE"

  native-test:
    needs: get-info
    if: ${{ github.event.workflow_run.conclusion == 'success' && needs.get-info.outputs.build-type == 'full' }}
    name: Native Test
    runs-on: ubuntu-latest
    env:
      MAVEN_OPTS: "-Xmx1500m -XX:+HeapDumpOnOutOfMemoryError"
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          sparse-checkout: |
             .github/
          sparse-checkout-cone-mode: false
          fetch-depth: 1

      - uses: graalvm/setup-graalvm@bef4b0e916c7dd079bf60fb95d49139f67e32c5f # v1
        with:
          java-version: 25
          distribution: 'graalvm'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Maven Artifacts
        uses: ./.github/actions/extract-maven-artifacts
        with:
         run-id: ${{ github.event.workflow_run.id }}

      - name: Download Infinispan Server
        id: dis
        uses: ./.github/actions/download-infinispan
        with:
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}

      - name: Extract Infinispan Source
        run: |
          mkdir test_dir && cd test_dir
          unzip -q "${GITHUB_WORKSPACE}/infinispan-${{ steps.dis.outputs.server-version }}-src.zip"
          mv infinispan-${{ steps.dis.outputs.server-version }}-src infinispan

      - name: Build Infinispan
        run: |
            cd test_dir/infinispan
            ./mvnw install -B -V -DskipTests -Dgithub.action=true

      - name: Native Test
        id: native-test
        shell: bash
        run: |
            cd test_dir/infinispan
            ./mvnw verify -B -V -e -Pnative \
            -pl graalvm/core,graalvm/client-hotrod,quarkus/cli \
            -Dmaven.test.failure.ignore=true -Dansi.strip=true \
            -Dgithub.action=true

      - name: Upload surefire test report
        if: (success() || failure())
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: surefire-test-report-native
          path: |
            test_dir/infinispan/**/target/*-reports*/**/TEST-*.xml
            !test_dir/infinispan/**/target/*-reports*/**/TEST-*FLAKY.xml
            !test_dir/infinispan/**/ignored*reports*
            test_dir/infinispan/**/*.dump*
            test_dir/infinispan/**/hs_err_*
            test_dir/infinispan/**/*.hprof

      - name: Upload log files
        if: (success() || failure())
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: log-files-native
          compression-level: 9
          path: |
            test_dir/infinispan/**/*.log
            !**/*[:"<>\*\?]*/**/*.log
            !**/*[:"<>\*\?]*.log

  native-cli-build:
    needs: get-info
    if: ${{ github.event.workflow_run.conclusion == 'success' && needs.get-info.outputs.build-type == 'full' }}
    name: Native CLI (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-2022]
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          sparse-checkout: |
             .github/
          sparse-checkout-cone-mode: false
          fetch-depth: 1

      - if: ${{ matrix.os == 'windows-2022' }}
        name: Add msbuild to PATH
        uses: microsoft/setup-msbuild@30375c66a4eea26614e0d39710365f22f8b0af57 # v3.0.0

      - uses: graalvm/setup-graalvm@bef4b0e916c7dd079bf60fb95d49139f67e32c5f # v1
        with:
          java-version: 25
          distribution: 'graalvm'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Maven Artifacts
        uses: ./.github/actions/extract-maven-artifacts
        with:
         run-id: ${{ github.event.workflow_run.id }}

      - name: Download Infinispan Server
        id: dis
        uses: ./.github/actions/download-infinispan
        with:
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}

      - name: Extract Infinispan Source
        run: |
          mkdir test_dir && cd test_dir
          unzip -q "${GITHUB_WORKSPACE}/infinispan-${{ steps.dis.outputs.server-version }}-src.zip"
          mv infinispan-${{ steps.dis.outputs.server-version }}-src infinispan
        shell: bash

      - if: ${{ matrix.os == 'windows-2022' }}
        name: Build native CLI
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvarsall.bat" x86_amd64
          cd test_dir\infinispan
          mvnw.cmd -V install -Pdistribution -Pnative -Pwindows -am -pl quarkus/cli -DskipTests -DskipITs -Dquarkus.native.native-image-xmx=6G
        shell: cmd

      - if: ${{ matrix.os != 'windows-2022' }}
        name: Build native CLI
        run: |
          cd test_dir/infinispan
          ./mvnw -V install -Pdistribution -Pnative -am -pl quarkus/cli -DskipTests -DskipITs
